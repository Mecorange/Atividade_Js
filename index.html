<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade de JS</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }
    button {
      background-color: white;
      color: black;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
  <script>
    function MAIOR_MENOR(a, b, c, d, e) {
      let numeros = [a, b, c, d, e];
      let maior = Math.max(...numeros);
      let menor = Math.min(...numeros);
      alert(`Maior número digitado: ${maior}, Menor número digitado: ${menor}`);
    }

    function VOGAL(c) {
      let vogais = "aeiouAEIOU";
      return vogais.includes(c) ? "Sim." : "Não.";
    }

    function LIMITES(li, ls) {
      let soma = 0;
      let pares = [];
      for (let i = li + 1; i < ls; i++) {
        if (i % 2 === 0) {
          pares.push(i);
          soma += i;
        }
      }
      alert(`Números pares do limite informado: ${pares.join(", ")}\nSoma dos números do limite: ${soma}`);
    }

    function ORDEM(a, b, c) {
      let numeros = [a, b, c];
      numeros.sort((x, y) => x - y);
      alert(`Números ordenados: ${numeros.join(", ")}`);
    }

    function POSITIVO_NEGATIVO(x) {
      return x >= 0;
    }

    function PAR_IMPAR(x) {
      return x % 2 === 0;
    }

    function executarFuncoes() {
      let numeros = prompt("Digite cinco números separados por espaço: ").split(" ").map(Number);
      MAIOR_MENOR(...numeros);

      let caractere = prompt("Digite um caractere: ");
      alert(`É vogal? ${VOGAL(caractere)}`);

      let limites = prompt("Digite um limite inferior e superior separados por espaço: ").split(" ").map(Number);
      LIMITES(...limites);

      let ordemNumeros = prompt("Digite três números separados por espaço: ").split(" ").map(Number);
      ORDEM(...ordemNumeros);

      let numPosNeg = Number(prompt("Digite um número para verificar se é positivo ou negativo: "));
      alert(`É positivo? ${POSITIVO_NEGATIVO(numPosNeg)}`);

      let numParImpar = Number(prompt("Digite um número para verificar se é par ou ímpar: "));
      alert(`É par? ${PAR_IMPAR(numParImpar)}`);
    }
  </script>
</head>
<body>
  <h1>Atividade JS</h1>
  <button onclick="executarFuncoes()">Iniciar exercicios</button>
</body>
</html>
